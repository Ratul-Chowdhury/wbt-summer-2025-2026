<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <header>
        <h1>Registration</h1>
        <p>Please complete all fields below.</p>
    </header>
    <form class="form2" method="post">
        <div class="field">
            <label for="name">First Name</label>
            
            <input type="text" id="name" name="name" placeholder="Jane Doe">
        </div>
       
        <div class="field">

            <label for="Postal code">Postal Code</label>

           

            <input type="number" id="Postal code" name="Postal code" placeholder="10001">
        </div>

        
        <div class="field">
            <label for="Date of birth">Date of Birth</label>
            
            <input type="date" id="Date of birth" name="Date of birth" placeholder="25/06/2026">
        </div>
       
        <div class="field">
            <label for="Email">Email Address</label>
            
            <input type="email" id="Email" name="Email" placeholder="jane@example.com">

        </div>

        
        <div class="field">
            <label for="Password">Password</label>
            
            <input type="password" id="Password" name="Password" placeholder="........">
        </div>
        
        <div class="dropdown">
            <label for="Country">Country</label>
            
            <select name="Country" id="Country">
                <option value="">Select a country</option>
                <option value="bd">Bangladesh</option>
                <option value="ca">Canada</option>
                <option value="uk">United Kingdom</option>
            </select>
        </div>
        
        <div class="button">
            <button type="submit">Submit</button><br><button type="reset">Reset</button>
        </div>


    </form>





</body>

</html>
